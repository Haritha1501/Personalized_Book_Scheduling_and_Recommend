server:
  port: 8080

spring:
  application:
    name: ReadQuest
  datasource:
    url: jdbc:postgresql://localhost:5432/book
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

# JWT security configuration parameters
app:
  jwt:
    # 512-bit HS512 secret key base64-encoded: "ReadQuestSecretKeyMustBeVeryLongToMeetSecurityRequirementsInSpringSecurityAndJJWT"
    secret: "3cfa89a9f24b41b9d4e5f76b1f2343e0984fb8e967d30f3ab26a7e02517865243851b9ffeb184d0b134d193e433433df716503c14c51921350a41d08779b9b5f"
    accessTokenExpirationMs: 3600000        # 1 hour
    refreshTokenExpirationMs: 2592000000     # 30 days

# External APIs
api:
  google-books:
    url: "https://www.googleapis.com/books/v1"
  open-library:
    url: "https://openlibrary.org"

# OpenAPI Swagger docs configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
